name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - work

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      APP_BASE_URL: https://cookingapp-6pj2.onrender.com
      APP_HEALTHCHECK_PATH: /health
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Add it in repository secrets." >&2
            exit 1
          fi

          curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Smoke check deployed app
        run: |
          app_url="${APP_BASE_URL%/}${APP_HEALTHCHECK_PATH}"

          for attempt in $(seq 1 30); do
            code=$(curl --silent --show-error --max-time 10 --output /dev/null --write-out "%{http_code}" "$app_url")
            if { [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; } || [ "$code" = "401" ] || [ "$code" = "403" ]; then
              echo "App is reachable at $app_url (HTTP $code)."
              exit 0
            fi

            echo "Attempt $attempt/30: app not ready yet at $app_url (HTTP $code). Waiting 20s..."
            sleep 20
          done

          echo "Timed out waiting for deployment at $app_url" >&2
          exit 1
